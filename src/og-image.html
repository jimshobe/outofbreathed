<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0f0f0f;
      font-family: 'Outfit', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      height: 100%;
      padding: 80px 100px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #c96a2e;
      flex-shrink: 0;
    }

    .site-name {
      font-size: 1.1rem;
      font-weight: 400;
      color: #6b6866;
      letter-spacing: 0.01em;
    }

    .middle {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    h1 {
      font-size: 5.5rem;
      font-weight: 300;
      color: #e8e6e1;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    h1 span {
      color: #c96a2e;
    }

    .tagline {
      font-size: 1.4rem;
      font-weight: 300;
      color: #3a3836;
      letter-spacing: -0.01em;
    }

    .bottom {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .bar {
      height: 2px;
      background: #1e1e1e;
      flex: 1;
    }

    .bar-accent {
      height: 2px;
      width: 60px;
      background: #c96a2e;
      margin-right: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="dot"></div>
      <span class="site-name">outofbreathed.com</span>
    </div>

    <div class="middle">
      <h1>out of<br><span>breathed</span></h1>
      <p class="tagline">A personal stream.</p>
    </div>

    <div class="bottom">
      <div class="bar-accent"></div>
      <div class="bar"></div>
    </div>
  </div>
</body>
</html>
